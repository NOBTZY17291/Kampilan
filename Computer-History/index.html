  const TOTAL = pages.length;
  let current = 0;
  let animating = false;


  const bookPage      = document.getElementById('bookPage');
  const chapterLabel  = document.getElementById('chapterLabel');
  const pageNumEl     = document.getElementById('pageNum');
  const pageTitle     = document.getElementById('pageTitle');
  const pageImg       = document.getElementById('pageImg');
  const pageImgLabel  = document.getElementById('pageImgLabel');
  const pageImgCont   = document.getElementById('pageImgContainer');
  const pageContent   = document.getElementById('pageContent');
  const pageBody      = document.getElementById('pageBody');
  const prevBtn       = document.getElementById('prevBtn');
  const nextBtn       = document.getElementById('nextBtn');
  const navNum        = document.getElementById('navNum');
  const progress      = document.getElementById('progress');
  const swipeHint     = document.getElementById('swipeHint');


  setTimeout(() => swipeHint.classList.add('hidden'), 3000);

  function render(idx) {
    const p = pages[idx];
    chapterLabel.textContent = p.chapter;
    pageNumEl.textContent    = `${idx + 1} / ${TOTAL}`;
    navNum.textContent       = `${idx + 1} / ${TOTAL}`;
    pageTitle.textContent    = p.title;
    pageTitle.style.display  = p.title ? '' : 'none';

    if (p.img) {
      pageImg.src = p.img;
      pageImgLabel.textContent = p.imgLabel;
      pageImgCont.style.display = 'block';
      
      if (!p.text || p.text.trim() === '') {
        pageImg.classList.add('img-only-page');
        pageImg.style.maxHeight = '380px';
      } else {
        pageImg.classList.remove('img-only-page');
        pageImg.style.maxHeight = '260px';
      }
    } else {
      pageImgCont.style.display = 'none';
    }

    pageContent.innerHTML = p.text || '';
    pageBody.scrollTop = 0;

    prevBtn.disabled = idx === 0;
    nextBtn.disabled = idx === TOTAL - 1;


    progress.style.width = `${((idx + 1) / TOTAL) * 100}%`;
  }

  function turnPage(dir) {
    if (animating) return;
    const next = current + dir;
    if (next < 0 || next >= TOTAL) return;
    animating = true;

  
    bookPage.classList.add(dir > 0 ? 'turn-out' : 'turn-in');
    bookPage.classList.remove(dir > 0 ? 'turn-in' : 'turn-out');

    setTimeout(() => {
      current = next;
      render(current);

      
      bookPage.classList.remove('turn-out', 'turn-in', 'active');
      bookPage.classList.add(dir > 0 ? 'turn-in' : 'turn-out');

      
      void bookPage.offsetWidth;

      
      bookPage.classList.add('active');

      setTimeout(() => {
        bookPage.classList.remove('turn-in', 'turn-out', 'active');
        animating = false;
      }, 600);
    }, 320);
  }

  prevBtn.addEventListener('click', () => turnPage(-1));
  nextBtn.addEventListener('click', () => turnPage(1));

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown') turnPage(1);
    if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   turnPage(-1);
  });

  render(0);
  </script>
